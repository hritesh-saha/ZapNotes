version: '3.9'

services:
  backend:
    image: hriteshsaha4/zapnotes-backend:dev
    pull_policy: always
    # build:
    #   context: ./server
    #   dockerfile: Dockerfile
    container_name: zapnotes-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}  # 👈 Set your backend env var here
    networks:
      - zapnet

  frontend:
    image: hriteshsaha4/zapnotes-frontend:dev
    pull_policy: always
    container_name: zapnotes-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - zapnet

networks:
  zapnet:
    driver: bridge
